name: newsflash
description: A complete Flutter news app using NewsAPI

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ✅ HTTP requests to NewsAPI
  http: ^1.2.0

  # ✅ Open articles in browser (optional)
  url_launcher: ^6.2.5

  # ✅ Beautiful icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true